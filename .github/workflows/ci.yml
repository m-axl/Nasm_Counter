name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y nasm build-essential
      - name: Build
        run: make -f build/makefile
      - name: Run tests
        run: tests/run_tests.sh
